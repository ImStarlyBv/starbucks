# NutriBucks — one service, ONE port (nginx 80). No host binding:
# Coolify's reverse proxy reads the single exposed port and assigns the public one.
# Build:  docker compose up --build
services:
  web:
    build:
      context: .
      # Bake the canonical/sitemap base URL into the build.
      args:
        NUTRIBUCKS_SITE_URL: ${NUTRIBUCKS_SITE_URL:-https://www.nutribucks.app}
    image: nutribucks:latest
    container_name: nutribucks
    expose:
      - "80"        # internal-only; Coolify picks/publishes the host port
    restart: unless-stopped
