server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # Clean directory-style URLs (/drink/caffe-latte/ -> .../index.html)
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html { internal; }

    # Correct content type for the PWA manifest
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Long-cache fingerprint-free static assets (rebuilt on deploy anyway)
    location /assets/ {
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
    location /data/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # HTML: let clients revalidate so content updates ship promptly
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # Compression
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/manifest+json application/xml;

    # Light security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}
